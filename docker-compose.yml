# =============================================================================
# shared-services-classifier — Docker Compose (runtime: podman-compose)
# Ruta raíz: ~/stack_ticket/ticket-classification
# Marzo 2026
# =============================================================================
# USO:
#   cd ~/stack_ticket/ticket-classification && podman-compose up -d
#   cd ~/stack_ticket/ticket-classification && podman-compose down
#   cd ~/stack_ticket/ticket-classification && podman-compose logs -f langchain-agent
#
# NOTA Podman rootless:
#   Todas las imágenes usan prefijo docker.io/ explícito.
#   Podman no asume docker.io por defecto cuando no hay registries configurados.
#
# REDES EXTERNAS (creadas por infra-monitoring/startup.sh):
#   ticket-classification-network — red interna del stack de clasificación
#   ticket-management-network     — red compartida con ticket-management, notification, n8n
# =============================================================================

version: "3.8"

services:

  # ---------------------------------------------------------------------------
  # CAPA DE AGENTE — Orquestador LangGraph
  # Reemplaza n8n. Expone POST /process.
  # Flujo: classify → validate → save (loop con retry autónomo)
  # ---------------------------------------------------------------------------
  langchain-agent:
    build: ./langchain-agent
    container_name: langchain-agent
    ports:
      - "8001:8001"
    environment:
      - AGENT_HOST=0.0.0.0
      - AGENT_PORT=8001
      - LANGCHAIN_API_URL=http://langchain-api:8000
      - POSTGRES_HOST=${POSTGRES_HOST:-classifier-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-classifier_db}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin}
      - REDIS_HOST=${REDIS_HOST:-classifier-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-shared-services-classifier-dev}
      - AGENT_PROVIDER=${AGENT_PROVIDER:-ollama}
      - AGENT_MAX_ITERATIONS=${AGENT_MAX_ITERATIONS:-5}
      - AGENT_DOMAINS=${AGENT_DOMAINS:-IT,cliente,operaciones,otro}
      - VALIDATION_ENABLED=${VALIDATION_ENABLED:-true}
      - FUZZY_THRESHOLD=${FUZZY_THRESHOLD:-80}
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-0.7}
      - CATEGORIES_IT=${CATEGORIES_IT}
      - CATEGORIES_CLIENTE=${CATEGORIES_CLIENTE}
      - CATEGORIES_OPERACIONES=${CATEGORIES_OPERACIONES}
      - CATEGORIES_OTRO=${CATEGORIES_OTRO}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - MINIO_BUCKET=${MINIO_BUCKET:-email-attachments}
      - TICKET_MGMT_API_URL=${TICKET_MGMT_API_URL:-http://ticket-system-backend:8080/api/v1}
      - TICKET_MGMT_API_KEY=${TICKET_MGMT_API_KEY:-}
      - TICKET_MGMT_CATALOGO_ENABLED=${TICKET_MGMT_CATALOGO_ENABLED:-true}
      - AGENT_MOCK_CLASSIFY=${AGENT_MOCK_CLASSIFY:-false}
      - MOCK_DOMINIO=${MOCK_DOMINIO:-IT}
      - MOCK_CATEGORIA=${MOCK_CATEGORIA:-acceso}
      - MOCK_PRIORIDAD=${MOCK_PRIORIDAD:-BAJA}
      - MOCK_CONFIANZA=${MOCK_CONFIANZA:-1.0}
    volumes:
      - ./langchain-agent:/app    # Hot reload en desarrollo
    depends_on:
      classifier-db:
        condition: service_healthy
      classifier-redis:
        condition: service_healthy
      langchain-api:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - ticket-classification-network
      - ticket-management-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CAPA DE IA — Gateway FastAPI con patrón Adapter + Strategy
  # Expone POST /ask con campo provider intercambiable en runtime.
  # Cache Redis por MD5(prompt+system+provider), TTL 1h.
  # ---------------------------------------------------------------------------
  langchain-api:
    build: ./langchain-api
    container_name: langchain-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PROVIDER=${AGENT_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-shared-services-classifier-dev}
      - REDIS_HOST=${REDIS_HOST:-classifier-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      classifier-redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - ticket-classification-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MODELOS LOCALES — Ollama
  # Modelo por defecto: llama3.2:3b (sin internet, sin costo)
  # Descargar modelo: podman exec -it ollama ollama pull llama3.2:3b
  #
  # NOTA DNS Podman rootless WSL2:
  #   dns explícito necesario para que el contenedor resuelva registry.ollama.ai
  #   Solo se necesita internet para el pull inicial — después el modelo
  #   queda persistido en ./ollama_data y no requiere red.
  #   En producción Linux nativo este bloque dns: no es necesario.
  # ---------------------------------------------------------------------------
  ollama:
    image: docker.io/ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - ticket-classification-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BASE DE DATOS — PostgreSQL 15
  # DB: classifier_db | Tablas: tickets, agent_runs, attachments
  # Conexión interna: classifier-db:5432
  # ---------------------------------------------------------------------------
  classifier-db:
    image: docker.io/postgres:15-alpine
    container_name: classifier-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-classifier_db}
    ports:
      - "5432:5432"
    volumes:
      - classifier_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-classifier_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ticket-classification-network
      - ticket-management-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CACHE Y ESTADO — Redis 7
  # Usos: cache LLM (MD5, TTL 1h) + estado del agente entre nodos
  # ---------------------------------------------------------------------------
  classifier-redis:
    image: docker.io/redis:7-alpine
    container_name: classifier-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ticket-classification-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ALMACENAMIENTO DE OBJETOS — MinIO
  # Guarda archivos adjuntos de correos (Excel, PDF, etc.)
  # API: http://localhost:9000 | Consola: http://localhost:9001
  # Credenciales: minioadmin / minioadmin123
  # ---------------------------------------------------------------------------
  minio:
    image: docker.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ticket-classification-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MIGRACIONES — Flyway (one-shot al arrancar)
  # ---------------------------------------------------------------------------
  flyway:
    image: docker.io/flyway/flyway:10
    container_name: classifier-flyway
    command: migrate
    environment:
      - FLYWAY_URL=jdbc:postgresql://classifier-db:5432/${POSTGRES_DB:-classifier_db}
      - FLYWAY_USER=${POSTGRES_USER:-admin}
      - FLYWAY_PASSWORD=${POSTGRES_PASSWORD:-admin}
      - FLYWAY_LOCATIONS=filesystem:/flyway/sql
      - FLYWAY_CLEAN_DISABLED=true
      - FLYWAY_OUT_OF_ORDER=false
    volumes:
      - ./db/migrations/postgresql:/flyway/sql:ro
    depends_on:
      classifier-db:
        condition: service_healthy
    networks:
      - ticket-classification-network
    restart: "no"

# =============================================================================
# REDES EXTERNAS
# Creadas por infra-monitoring/startup.sh con subnets dedicadas.
# Crear manualmente si arrancas este stack de forma aislada:
#   podman network create --subnet 10.89.1.0/24 ticket-management-network
#   podman network create --subnet 10.89.2.0/24 ticket-classification-network
# =============================================================================
networks:
  ticket-classification-network:
    external: true
  ticket-management-network:
    external: true

volumes:
  classifier_postgres_data:
