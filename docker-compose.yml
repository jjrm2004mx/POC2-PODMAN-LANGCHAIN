# =============================================================================
# shared-services-classifier — Docker Compose (runtime: podman-compose)
# Ruta raíz: ~/podman/ticket-classification
# Marzo 2026
# =============================================================================
# USO:
#   cd ~/podman/ticket-classification && podman-compose up -d
#   cd ~/podman/ticket-classification && podman-compose down
#   cd ~/podman/ticket-classification && podman-compose logs -f langchain-agent
#
# NOTA Podman rootless:
#   Todas las imágenes usan prefijo docker.io/ explícito.
#   Podman no asume docker.io por defecto cuando no hay registries configurados.
# =============================================================================

version: "3.8"

services:

  # ---------------------------------------------------------------------------
  # CAPA DE AGENTE — Orquestador LangGraph
  # Reemplaza n8n. Expone POST /process.
  # Flujo: classify → validate → save (loop con retry autónomo)
  # ---------------------------------------------------------------------------
  langchain-agent:
    build: ./langchain-agent
    container_name: langchain-agent
    ports:
      - "8001:8001"
    environment:
      - AGENT_HOST=0.0.0.0
      - AGENT_PORT=8001
      - LANGCHAIN_API_URL=http://langchain-api:8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ai}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-shared-services-classifier-dev}
      - AGENT_PROVIDER=${AGENT_PROVIDER:-ollama}
      - AGENT_MAX_ITERATIONS=${AGENT_MAX_ITERATIONS:-5}
      - AGENT_DOMAINS=${AGENT_DOMAINS:-IT,cliente,operaciones,otro}
      - VALIDATION_ENABLED=${VALIDATION_ENABLED:-true}
      - FUZZY_THRESHOLD=${FUZZY_THRESHOLD:-80}
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-0.7}
      - CATEGORIES_IT=${CATEGORIES_IT}
      - CATEGORIES_CLIENTE=${CATEGORIES_CLIENTE}
      - CATEGORIES_OPERACIONES=${CATEGORIES_OPERACIONES}
      - CATEGORIES_OTRO=${CATEGORIES_OTRO}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - MINIO_BUCKET=${MINIO_BUCKET:-email-attachments}
      - TICKET_MGMT_API_URL=${TICKET_MGMT_API_URL}  # Requerido — definir en .env (ver env.txt)
      - TICKET_MGMT_API_KEY=${TICKET_MGMT_API_KEY:-change-this-secret-key-in-production}
      - TICKET_MGMT_CATALOGO_ENABLED=${TICKET_MGMT_CATALOGO_ENABLED:-true}
      - AGENT_MOCK_CLASSIFY=${AGENT_MOCK_CLASSIFY:-false}
      - MOCK_DOMINIO=${MOCK_DOMINIO:-IT}
      - MOCK_CATEGORIA=${MOCK_CATEGORIA:-acceso}
      - MOCK_PRIORIDAD=${MOCK_PRIORIDAD:-BAJA}
      - MOCK_CONFIANZA=${MOCK_CONFIANZA:-1.0}
    volumes:
      - ./langchain-agent:/app    # Hot reload en desarrollo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      langchain-api:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - ai-network
      - shared-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CAPA DE IA — Gateway FastAPI con patrón Adapter + Strategy
  # Expone POST /ask con campo provider intercambiable en runtime.
  # Cache Redis por MD5(prompt+system+provider), TTL 1h.
  # ---------------------------------------------------------------------------
  langchain-api:
    build: ./langchain-api
    container_name: langchain-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PROVIDER=${AGENT_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-shared-services-classifier-dev}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - ai-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MODELOS LOCALES — Ollama
  # Modelo por defecto: llama3.2:3b (sin internet, sin costo)
  # Descargar modelo: podman exec -it ollama ollama pull llama3.2:3b
  #
  # NOTA DNS Podman rootless WSL2:
  #   dns explícito necesario para que el contenedor resuelva registry.ollama.ai
  #   Solo se necesita internet para el pull inicial — después el modelo
  #   queda persistido en ./ollama_data y no requiere red.
  #   En producción Linux nativo este bloque dns: no es necesario.
  # ---------------------------------------------------------------------------
  ollama:
    image: docker.io/ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - ai-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BASE DE DATOS — PostgreSQL 15
  # DB: ai | Tablas: ss_tickets, ss_agent_runs
  # Conexión interna: postgres:5432
  # ---------------------------------------------------------------------------
  postgres:
    image: docker.io/postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-ai}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CACHE Y ESTADO — Redis 7
  # Usos: cache LLM (MD5, TTL 1h) + estado del agente entre nodos
  # Sin autenticación — red interna Podman únicamente
  # ---------------------------------------------------------------------------
  redis:
    image: docker.io/redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILIDAD — Prometheus
  # Scrape cada 15s a todos los servicios con /metrics
  # ---------------------------------------------------------------------------
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ai-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILIDAD — Grafana
  # Dashboards: métricas Prometheus + logs Loki
  # URL: http://localhost:3000 | Credenciales: admin / admin (o GRAFANA_PASSWORD)
  #
  # NOTA permisos Podman rootless:
  #   Si grafana_data da Permission denied, ejecutar:
  #   podman unshare chown -R 472:472 grafana_data/
  # ---------------------------------------------------------------------------
  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-provisioning/dashboard-files:/etc/grafana/provisioning/dashboard-files:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - ai-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILIDAD — Node Exporter
  # Métricas del host: CPU, RAM, disco, carga (best effort en WSL2)
  # Especialmente útil para monitorear impacto de inferencia Ollama
  # ---------------------------------------------------------------------------
  node-exporter:
    image: docker.io/prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - ai-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILIDAD — Loki
  # Agrega logs de todos los contenedores Podman
  # URL interna: loki:3100
  # Versión 2.9.0 — misma versión que Promtail para compatibilidad garantizada
  # ---------------------------------------------------------------------------
  loki:
    image: docker.io/grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ai-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILIDAD — Promtail 2.9.0
  # Lee logs desde journald (compatible WSL2 y Linux nativo)
  # IMPORTANTE: usar versión 2.9.0 — promtail:latest (3.x) no incluye
  # soporte para journald compilado.
  #
  # Volúmenes montados:
  #   /var/log/journal  → archivos de journal persistentes
  #   /run/log/journal  → journal en memoria (si existe)
  #   /etc/machine-id   → identificador de máquina requerido por journald
  #
  # NOTA WSL2 permisos:
  #   sudo chmod o+r /var/log/journal/<machine-id>/*.journal
  # ---------------------------------------------------------------------------
  promtail:
    image: docker.io/grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - ./promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ai-network
    restart: unless-stopped

# =============================================================================
# RED INTERNA
# Red explícita para garantizar resolución de nombres estable entre reinicios
# =============================================================================
  # ---------------------------------------------------------------------------
  # ALMACENAMIENTO DE OBJETOS — MinIO
  # Guarda archivos adjuntos de correos (Excel, PDF, etc.)
  # API: http://localhost:9000 | Consola: http://localhost:9001
  # Credenciales: minioadmin / minioadmin123
  # ---------------------------------------------------------------------------
  minio:
    image: docker.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge
  # Red compartida con ticket-management-backend
  # Crear una vez en Podman antes de levantar ambos stacks:
  #   podman network create shared-network
  shared-network:
    external: true
